name: student_logbook
description: Premium Student Logbook System for 2000 students and 200 teachers.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI & Material
  google_fonts: ^6.1.0
  flutter_animate: ^4.1.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.0.0
  shared_preferences: ^2.2.2

  # File Picker & Parsing
  file_picker: ^8.0.0
  csv: ^6.0.0
  excel: ^4.0.0

  # HTTP (for mock API)
  dio: ^5.3.1

  # Logging
  logger: ^2.0.0

  # Supabase
  supabase_flutter: ^2.4.0

  # Image Picker
  image_picker: ^1.0.7

  # S3 Compatible Storage (for Backblaze B2)
  minio: ^3.5.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  hive_generator: ^2.0.0
  build_runner: ^2.4.6
  riverpod_generator: ^2.3.0
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/